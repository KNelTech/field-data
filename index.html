<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Concare Tool Tracker</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:#0f1114;color:#e8eaed;min-height:100vh;-webkit-tap-highlight-color:transparent}

.header{position:sticky;top:0;z-index:100;background:rgba(15,17,20,.92);backdrop-filter:blur(12px);border-bottom:1px solid #333842;padding:14px 16px;display:flex;align-items:center;justify-content:space-between}
.header-left{display:flex;align-items:center;gap:10px}
.logo{width:32px;height:32px;background:#3b82f6;border-radius:7px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:#fff}
.header h1{font-size:16px;font-weight:700}
.header .date{font-family:'JetBrains Mono',monospace;font-size:12px;color:#9aa0ab}

.main{padding:12px;max-width:800px;margin:0 auto;padding-bottom:100px}

.add-row{background:#1a1d23;border:1px dashed #333842;border-radius:12px;padding:14px;display:flex;gap:10px;margin-bottom:12px}
.add-row select{flex:1;background:#22262e;border:1px solid #333842;border-radius:8px;color:#e8eaed;font-family:'DM Sans',sans-serif;font-size:14px;padding:10px 12px;outline:none}
.add-row button{background:#3b82f6;color:#fff;border:none;border-radius:8px;padding:8px 16px;font-weight:600;font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif}

.card{background:#1a1d23;border:1px solid #333842;border-radius:12px;margin-bottom:10px;overflow:hidden}
.card-head{padding:12px 14px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none}
.card-info{display:flex;align-items:center;gap:10px}
.avatar{width:34px;height:34px;border-radius:8px;background:#2a2f38;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:#3b82f6;flex-shrink:0}
.card-name{font-weight:600;font-size:14px}
.chev{color:#9aa0ab;font-size:18px;transition:transform .2s}
.card.open .chev{transform:rotate(180deg)}
.card-body{display:none;border-top:1px solid #333842;padding:8px}
.card.open .card-body{display:block}

.entry{background:#22262e;border:1px solid #333842;border-radius:10px;padding:10px;margin-bottom:6px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;position:relative}
.entry select,.entry input[type="time"]{background:#1a1d23;border:1px solid #333842;border-radius:7px;color:#e8eaed;font-family:'DM Sans',sans-serif;font-size:13px;padding:8px;outline:none}
.entry select:focus,.entry input:focus{border-color:#3b82f6}
.entry .tsel{flex:1;min-width:120px}
.tg{display:flex;align-items:center;gap:4px}
.tg input{width:110px;font-family:'JetBrains Mono',monospace!important;color-scheme:dark}
.tg span{color:#9aa0ab;font-size:12px}
.xbtn{background:none;border:none;color:#9aa0ab;font-size:18px;cursor:pointer;padding:4px;border-radius:6px;flex-shrink:0}
.xbtn:hover{color:#ef4444}

.add-entry{width:100%;background:#0f1114;border:1px dashed #333842;border-radius:8px;color:#9aa0ab;font-family:'DM Sans',sans-serif;font-size:13px;padding:10px;cursor:pointer;margin-top:4px}
.add-entry:hover{border-color:#3b82f6;color:#3b82f6}
.del-person{float:right;background:none;border:none;color:#9aa0ab;font-size:12px;cursor:pointer;padding:5px 8px;border-radius:6px;font-family:'DM Sans',sans-serif;margin-top:6px}
.del-person:hover{color:#ef4444}

.bottom{position:fixed;bottom:0;left:0;right:0;background:rgba(15,17,20,.95);backdrop-filter:blur(12px);border-top:1px solid #333842;padding:12px 16px;display:flex;justify-content:center;z-index:100}
.bottom button{background:#3b82f6;color:#fff;border:none;border-radius:10px;padding:12px 24px;font-size:15px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;width:100%;max-width:400px}
.bottom button:disabled{opacity:.5}

.toast{position:fixed;top:80px;left:50%;transform:translateX(-50%) translateY(-20px);font-weight:600;font-size:14px;padding:12px 24px;border-radius:10px;z-index:300;opacity:0;transition:all .3s;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:250;align-items:center;justify-content:center;flex-direction:column;gap:16px}
.overlay.show{display:flex}
.spin{width:40px;height:40px;border:3px solid #333842;border-top-color:#3b82f6;border-radius:50%;animation:sp .8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}

.clear-btn{background:none;border:1px solid #333842;border-radius:7px;color:#9aa0ab;font-family:'DM Sans',sans-serif;font-size:12px;padding:6px 12px;cursor:pointer}
.clear-btn:hover{border-color:#ef4444;color:#ef4444}

@media(max-width:500px){
  .entry{flex-direction:column;align-items:stretch;gap:6px;padding-right:30px}
  .entry .tsel{width:100%}
  .xbtn{position:absolute;top:8px;right:8px}
}
</style>

class ToolTrackerStore {
  constructor(key) {
    this.key = key;
  }

  load() {
    try {
      return JSON.parse(localStorage.getItem(this.key) || '[]');
    } catch (e) {
      localStorage.removeItem(this.key);
      return [];
    }
  }

  save(data) {
    localStorage.setItem(this.key, JSON.stringify(data));
  }

  clear() {
    localStorage.removeItem(this.key);
  }
}

class ToolReportBuilder {
  formatTime(time) {
    if (!time) return '—';
    const [h, m] = time.split(':').map(Number);
    return (h % 12 || 12) + ':' + m.toString().padStart(2,'0') + (h >= 12 ? ' PM' : ' AM');
  }

  formatSubjectDate(date) {
    const year = date.getFullYear();
    const month = String(date.getMonth() + 1).padStart(2, '0');
    const day = String(date.getDate()).padStart(2, '0');
    return `${year}-${month}-${day}`;
  }

  build(people) {
    const now = new Date();
    const date = now.toLocaleDateString('en-US', {
      weekday:'long',
      month:'long',
      day:'numeric',
      year:'numeric'
    });
    let report = `CONCARE DAILY TOOL USAGE REPORT\nDate: ${date}\nGenerated: ${now.toLocaleTimeString('en-US')}\n${'─'.repeat(45)}`;
    let total = 0;

    people.forEach(person => {
      const entries = person.entries.filter(entry => entry.tool);
      if (!entries.length) return;
      report += `\n\n▸ ${person.name.toUpperCase()}`;
      entries.forEach((entry, i) => {
        total++;
        report += `\n  ${(i + 1).toString().padStart(2)}.  ${entry.tool}\n      ${this.formatTime(entry.t1)} → ${this.formatTime(entry.t2)}`;
      });
    });

    report += `\n\n${'─'.repeat(45)}\nSUMMARY: ${people.filter(person => person.entries.some(entry => entry.tool)).length} crew, ${total} tools`;
    return {
      report,
      total,
      subject: 'Tool Report — ' + this.formatSubjectDate(now)
    };
  }
}

class EmailService {
  constructor({ publicKey, serviceId, templateId, recipients }) {
    this.publicKey = publicKey;
    this.serviceId = serviceId;
    this.templateId = templateId;
    this.recipients = recipients;
  }

  init() {
    if (typeof emailjs === 'undefined') {
      console.error('EmailJS library not loaded — check network/CDN');
      return;
    }
    emailjs.init({ publicKey: this.publicKey });
  }

  async sendReport({ subject, message }) {
    if (typeof emailjs === 'undefined' || !emailjs.send) {
      throw new Error('EmailJS library failed to load');
    }
    return emailjs.send(this.serviceId, this.templateId, {
      subject,
      message,
      to_email: this.recipients,
      recipient: this.recipients,
      recipients: this.recipients
    });
  }
}

class ToolTrackerPage {
  constructor({ store, reportBuilder, emailService }) {
    this.store = store;
    this.reportBuilder = reportBuilder;
    this.emailService = emailService;
    this.uid = 0;
    this.usedNames = [];

    this.cardsEl = document.getElementById('cards');
    this.addSelEl = document.getElementById('addSel');
    this.addPersonBtnEl = document.getElementById('addPersonBtn');
    this.clearBtnEl = document.getElementById('clearBtn');
    this.subBtnEl = document.getElementById('subBtn');
    this.toastEl = document.getElementById('toast');
    this.overlayEl = document.getElementById('ov');
    this.dateDispEl = document.getElementById('dateDisp');
  }

  init() {
    this.dateDispEl.textContent = new Date().toLocaleDateString('en-US', {
      weekday:'long',
      month:'long',
      day:'numeric',
      year:'numeric'
    });
    this.emailService.init();
    this.bindEvents();
    this.refreshDropdown();
    this.loadState();
  }

  bindEvents() {
    this.addPersonBtnEl.addEventListener('click', () => this.addPerson());
    this.clearBtnEl.addEventListener('click', () => this.clearAll());
    this.subBtnEl.addEventListener('click', () => this.doSubmit());

    this.cardsEl.addEventListener('click', e => {
      const head = e.target.closest('.card-head');
      if (head) {
        head.closest('.card').classList.toggle('open');
        return;
      }

      if (e.target.classList.contains('add-entry')) {
        this.addEntry(e.target.dataset.cardId);
        return;
      }

      if (e.target.classList.contains('del-person')) {
        this.removePerson(e.target.dataset.cardId, e.target.dataset.name);
        return;
      }

      if (e.target.classList.contains('xbtn')) {
        this.removeEntry(e.target.dataset.entryId);
      }
    });

    this.cardsEl.addEventListener('input', e => {
      if (e.target.type === 'time') {
        if (e.target.value) e.target.style.borderColor = '';
        this.saveState();
      }
    });

    this.cardsEl.addEventListener('change', e => {
      if (e.target.closest('.card')) this.saveState();
    });
  }

  nextId() {
    return 'x' + (this.uid++);
  }

  esc(value) {
    return String(value)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  initials(name) {
    return name.split(' ').map(w => w[0]).slice(0,2).join('').toUpperCase();
  }

  toolOpts(selected) {
    let h = '<option value="">Select tool...</option>';
    TOOLS.forEach(t => {
      const s = t === selected ? ' selected' : '';
      h += `<option value="${this.esc(t)}"${s}>${this.esc(t)}</option>`;
    });
    return h;
  }

  makeEntry(entryId, tool, t1, t2) {
    return `<div class="entry" id="${entryId}">
      <select class="tsel">${this.toolOpts(tool)}</select>
      <div class="tg">
        <input type="time" value="${this.esc(t1 || '')}">
        <span>→</span>
        <input type="time" value="${this.esc(t2 || '')}">
      </div>
      <button class="xbtn" data-entry-id="${this.esc(entryId)}">×</button>
    </div>`;
  }

  refreshDropdown() {
    this.addSelEl.innerHTML = '<option value="">+ Add crew member...</option>';
    NAMES.filter(n => !this.usedNames.includes(n)).forEach(n => {
      this.addSelEl.innerHTML += `<option value="${this.esc(n)}">${this.esc(n)}</option>`;
    });
  }

  addPerson(data) {
    const name = data ? data.name : this.addSelEl.value;
    if (!name) return;

    this.usedNames.push(name);
    const cardId = this.nextId();
    const entries = data && data.entries ? data.entries : [{}];
    const entriesHtml = entries.map(e => this.makeEntry(this.nextId(), e.tool, e.t1, e.t2)).join('');

    this.cardsEl.querySelectorAll('.card').forEach(card => card.classList.remove('open'));

    const card = document.createElement('div');
    card.className = 'card open';
    card.id = cardId;
    card.innerHTML = `
      <div class="card-head">
        <div class="card-info">
          <div class="avatar">${this.esc(this.initials(name))}</div>
          <div><div class="card-name">${this.esc(name)}</div></div>
        </div>
        <span class="chev">▾</span>
      </div>
      <div class="card-body">
        <div class="entries" id="entries-${cardId}">
          ${entriesHtml}
        </div>
        <button class="add-entry" data-card-id="${this.esc(cardId)}">+ Add tool entry</button>
        <button class="del-person" data-card-id="${this.esc(cardId)}" data-name="${this.esc(name)}">Remove ${this.esc(name.split(' ')[0])}</button>
      </div>
    `;

    this.cardsEl.appendChild(card);
    this.refreshDropdown();
    if (!data) this.saveState();
  }

  addEntry(cardId) {
    const container = document.getElementById('entries-' + cardId);
    if (!container) return;
    if (container.children.length >= 20) {
      this.toast('Max 20 entries', true);
      return;
    }
    container.insertAdjacentHTML('beforeend', this.makeEntry(this.nextId()));
    this.saveState();
  }

  removeEntry(entryId) {
    const el = document.getElementById(entryId);
    if (!el) return;
    const container = el.parentElement;
    el.remove();
    if (container.children.length === 0) {
      container.insertAdjacentHTML('beforeend', this.makeEntry(this.nextId()));
    }
    this.saveState();
  }

  removePerson(cardId, name) {
    if (!confirm('Remove ' + name.split(' ')[0] + '?')) return;
    const card = document.getElementById(cardId);
    if (card) card.remove();
    this.usedNames = this.usedNames.filter(n => n !== name);
    this.refreshDropdown();
    this.saveState();
  }

  toast(msg, err) {
    this.toastEl.textContent = msg;
    this.toastEl.style.background = err ? '#ef4444' : '#22c55e';
    this.toastEl.style.color = err ? '#fff' : '#000';
    this.toastEl.className = 'toast';
    requestAnimationFrame(() => this.toastEl.classList.add('show'));
    setTimeout(() => this.toastEl.classList.remove('show'), 3000);
  }

  collectData() {
    return Array.from(this.cardsEl.querySelectorAll('.card')).map(card => {
      const name = card.querySelector('.card-name').textContent;
      const entries = Array.from(card.querySelectorAll('.entry')).map(row => {
        const tool = row.querySelector('.tsel').value;
        const times = row.querySelectorAll('input[type="time"]');
        return { tool: tool || '', t1: times[0].value || '', t2: times[1].value || '' };
      });
      return { name, entries };
    });
  }

  saveState() {
    this.store.save(this.collectData());
  }

  loadState() {
    this.store.load().forEach(person => this.addPerson(person));
  }

  clearAll() {
    if (!this.cardsEl.querySelectorAll('.card').length) return;
    if (!confirm('Clear all entries and start over?')) return;
    this.cardsEl.innerHTML = '';
    this.usedNames = [];
    this.store.clear();
    this.refreshDropdown();
    this.toast('All cleared');
  }

  validateTimes() {
    let incomplete = false;
    this.cardsEl.querySelectorAll('.entry').forEach(row => {
      const tool = row.querySelector('.tsel').value;
      if (!tool) return;
      const times = row.querySelectorAll('input[type="time"]');
      if (!times[0].value || !times[1].value) {
        incomplete = true;
        times.forEach(time => { if (!time.value) time.style.borderColor = '#ef4444'; });
      }
    });
    return !incomplete;
  }

  async doSubmit() {
    const data = this.collectData();
    const { report, total, subject } = this.reportBuilder.build(data);
    if (!total) {
      this.toast('No data yet', true);
      return;
    }
    if (!this.validateTimes()) {
      this.toast('Fill in all time fields', true);
      return;
    }

    this.subBtnEl.disabled = true;
    this.overlayEl.classList.add('show');

    try {
      await this.emailService.sendReport({ subject, message: report });
      this.overlayEl.classList.remove('show');
      this.toast('✓ Report sent!');
      this.cardsEl.innerHTML = '';
      this.usedNames = [];
      this.store.clear();
      this.refreshDropdown();
      this.subBtnEl.disabled = false;
    } catch (e) {
      this.overlayEl.classList.remove('show');
      this.subBtnEl.disabled = false;
      const msg = e?.text || e?.message || 'Unknown error';
      this.toast('Send failed: ' + msg, true);
      console.error('EmailJS error:', e);
    }
  }
}

new ToolTrackerPage({

  reportBuilder: new ToolReportBuilder(),
  emailService: new EmailService({

    serviceId: "service_ConcareKND",
    templateId: "template_concare",
    recipients: EMAIL_RECIPIENTS

</script>
